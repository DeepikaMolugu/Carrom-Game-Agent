<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer Carrom</title>
    <style>
        :root {
            --board-outer: #8B4513;
            --board-inner: #F5DEB3;
            --pocket: #111;
            --white-piece: #f9f9f9;
            --black-piece: #222;
            --queen-piece: #e74c3c;
            --striker: #3498db;
            --ui-bg: #2c3e50;
            --text-color: #ecf0f1;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .game-container {
            display: flex;
            gap: 30px;
            background: var(--ui-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .canvas-container {
            position: relative;
            width: 600px;
            height: 600px;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        canvas {
            display: block;
            background-color: var(--board-outer);
            cursor: crosshair;
        }

        .ui-panel {
            display: flex;
            flex-direction: column;
            width: 250px;
        }

        .score-board {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }

        .player-score {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 1.2rem;
        }

        .turn-indicator {
            text-align: center;
            padding: 10px;
            background: #2ecc71;
            color: #fff;
            border-radius: 5px;
            font-weight: bold;
            margin-bottom: 20px;
            transition: background 0.3s;
        }

        .turn-p2 {
            background: #e67e22;
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        
        label {
            font-size: 0.9rem;
            color: #aaa;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
        }

        button {
            padding: 12px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: #2980b9;
        }
        button:active {
            transform: scale(0.98);
        }
        
        .agent-logs {
            margin-top: 20px;
            background: #111;
            padding: 10px;
            border-radius: 8px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 0.85rem;
            color: #2ecc71;
        }

        /* Power meter bar */
        .power-bar-container {
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 6px;
            overflow: hidden;
            margin-top: 4px;
        }
        #powerBar {
            height: 100%;
            width: 0%;
            border-radius: 6px;
            background: linear-gradient(90deg, #2ecc71, #f1c40f, #e74c3c);
            transition: width 0.05s;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <!-- Canvas for the Game -->
        <div class="canvas-container">
            <canvas id="carromCanvas" width="600" height="600"></canvas>
        </div>

        <!-- UI Panel -->
        <div class="ui-panel">
            <div class="score-board">
                <h2>Score</h2>
                <div class="player-score">
                    <span>Player 1 (White)</span>
                    <span id="score1">0</span>
                </div>
                <div class="player-score">
                    <span>Player 2 (Black)</span>
                    <span id="score2">0</span>
                </div>
            </div>

            <div id="turnIndicator" class="turn-indicator">
                Player 1's Turn
            </div>

            <div class="agent-logs" id="agentLogs">
                > System initialized...<br>
                > Awaiting moves...<br>
            </div>

            <div class="controls">
                <div class="control-group">
                    <label for="strikerPos">Striker Placement</label>
                    <input type="range" id="strikerPos" min="-1" max="1" step="0.01" value="0">
                </div>
                <div class="control-group">
                    <label>Shot Power</label>
                    <div class="power-bar-container">
                        <div id="powerBar"></div>
                    </div>
                </div>
                <button id="resetBtn">Restart Game</button>
            </div>
        </div>
    </div>

<script>
/**
 * Pure HTML5 Canvas & Vanilla JS Physics Engine for Carrom
 * Fixed: striker accumulation bug, realistic drag, rich sound effects
 */

const canvas = document.getElementById('carromCanvas');
const ctx = canvas.getContext('2d');
const score1El = document.getElementById('score1');
const score2El = document.getElementById('score2');
const turnIndicator = document.getElementById('turnIndicator');
const strikerPosSlider = document.getElementById('strikerPos');
const resetBtn = document.getElementById('resetBtn');
const agentLogs = document.getElementById('agentLogs');
const powerBar = document.getElementById('powerBar');

// Physics Constants
const FRICTION = 0.985;
const RESTITUTION = 0.9;
const POCKET_RADIUS = 25;
const BOARD_MARGIN = 40;
const INNER_BOARD_SIZE = canvas.width - 2 * BOARD_MARGIN;
const MAX_POWER = 25;

// Game State
let pieces = [];
let pockets = [];
let currentPlayer = 1;
let score = { 1: 0, 2: 0 };
let isAiming = false;
let aimStart = { x: 0, y: 0 };
let aimCurrent = { x: 0, y: 0 };
let piecesMoving = false;
let striker = null;
let queenPocketed = false;
let turnScore = 0;

// Drag sound throttle
let lastDragSoundTime = 0;

// Enum for Piece Types
const TYPE = {
    STRIKER: 'striker',
    WHITE: 'white',
    BLACK: 'black',
    QUEEN: 'queen'
};

// ─── Audio Engine ───────────────────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function resumeAudio() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

/** Woody thud for piece collisions */
function playCollisionSound(intensity) {
    resumeAudio();
    if (intensity < 0.3) return;
    const vol = Math.min(intensity / 15, 0.5);

    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 3);
    }
    const source = audioCtx.createBufferSource();
    source.buffer = buf;

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800 + intensity * 40;
    filter.Q.value = 1.5;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);

    source.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    source.start();
}

/** Heavy thud when striker hits a piece */
function playStrikerHitSound(intensity) {
    resumeAudio();
    if (intensity < 0.5) return;
    const vol = Math.min(intensity / 12, 0.6);

    // Low thump
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(60, audioCtx.currentTime + 0.12);
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);

    // Click transient
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.02, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 5);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(Math.min(vol * 1.5, 0.8), audioCtx.currentTime);
    src.connect(g2);
    g2.connect(audioCtx.destination);
    src.start();
}

/** Rubber-band stretch while dragging */
function playDragSound(power) {
    resumeAudio();
    const now = performance.now();
    if (now - lastDragSoundTime < 80) return; // throttle
    lastDragSoundTime = now;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    const freq = 300 + power * 8;
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
    gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.06);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.06);
}

/** Snap / release sound when shooting */
function playReleaseSound(power) {
    resumeAudio();
    const vol = Math.min(power / MAX_POWER, 1) * 0.5;

    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
        const t = i / audioCtx.sampleRate;
        data[i] = Math.sin(2 * Math.PI * (400 - t * 1500) * t)
                  * Math.pow(1 - t / 0.15, 2)
                  * (Math.random() * 0.3 + 0.7);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    src.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
}

/** Satisfying pocket whoosh */
function playPocketSound() {
    resumeAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(500, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.25);
    gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.25);
}

/** Foul buzzer */
function playFoulSound() {
    resumeAudio();
    for (let i = 0; i < 3; i++) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = 180;
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime + i * 0.12);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i * 0.12 + 0.1);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(audioCtx.currentTime + i * 0.12);
        osc.stop(audioCtx.currentTime + i * 0.12 + 0.1);
    }
}

// ─── Piece Class ─────────────────────────────────────────────────────────────
class Piece {
    constructor(x, y, radius, color, type, mass = 1) {
        this.x = x;
        this.y = y;
        this.radius = radius;
        this.color = color;
        this.type = type;
        this.mass = mass;
        this.vx = 0;
        this.vy = 0;
        this.active = true;
        this.pocketAnim = 0; // shrink animation when pocketed
    }

    draw(ctx) {
        if (!this.active) return;

        const r = this.radius;

        // Glow for striker while aiming
        if (this.type === TYPE.STRIKER && (isAiming || (this.vx === 0 && this.vy === 0 && !piecesMoving))) {
            ctx.save();
            ctx.shadowBlur = isAiming ? 20 : 10;
            ctx.shadowColor = '#3498db';
            ctx.restore();
        }

        ctx.beginPath();
        ctx.arc(this.x, this.y, r, 0, Math.PI * 2);

        // Gradient fill for 3D look
        if (this.type === TYPE.STRIKER) {
            const grad = ctx.createRadialGradient(this.x - r*0.3, this.y - r*0.3, r*0.1, this.x, this.y, r);
            grad.addColorStop(0, '#74b9ff');
            grad.addColorStop(1, '#2980b9');
            ctx.fillStyle = grad;
        } else if (this.type === TYPE.QUEEN) {
            const grad = ctx.createRadialGradient(this.x - r*0.3, this.y - r*0.3, r*0.1, this.x, this.y, r);
            grad.addColorStop(0, '#ff7675');
            grad.addColorStop(1, '#c0392b');
            ctx.fillStyle = grad;
        } else if (this.type === TYPE.WHITE) {
            const grad = ctx.createRadialGradient(this.x - r*0.3, this.y - r*0.3, r*0.1, this.x, this.y, r);
            grad.addColorStop(0, '#ffffff');
            grad.addColorStop(1, '#bdc3c7');
            ctx.fillStyle = grad;
        } else {
            const grad = ctx.createRadialGradient(this.x - r*0.3, this.y - r*0.3, r*0.1, this.x, this.y, r);
            grad.addColorStop(0, '#636e72');
            grad.addColorStop(1, '#1a1a2e');
            ctx.fillStyle = grad;
        }

        ctx.fill();
        ctx.lineWidth = 1.5;
        ctx.strokeStyle = 'rgba(0,0,0,0.5)';
        ctx.stroke();

        // Inner detail ring
        if (this.type !== TYPE.STRIKER) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, r * 0.5, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 1;
            ctx.stroke();
        } else {
            // Striker inner rings
            ctx.beginPath();
            ctx.arc(this.x, this.y, r * 0.65, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(this.x, this.y, r * 0.28, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.85)';
            ctx.fill();
        }

        // Specular highlight
        ctx.beginPath();
        ctx.ellipse(this.x - r * 0.25, this.y - r * 0.25, r * 0.22, r * 0.14, -Math.PI/4, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.35)';
        ctx.fill();
    }

    update() {
        if (!this.active) return;

        this.x += this.vx;
        this.y += this.vy;

        this.vx *= FRICTION;
        this.vy *= FRICTION;

        if (Math.abs(this.vx) < 0.05) this.vx = 0;
        if (Math.abs(this.vy) < 0.05) this.vy = 0;

        const leftBound = BOARD_MARGIN + this.radius;
        const rightBound = canvas.width - BOARD_MARGIN - this.radius;
        const topBound = BOARD_MARGIN + this.radius;
        const bottomBound = canvas.height - BOARD_MARGIN - this.radius;

        if (this.x < leftBound) {
            this.x = leftBound;
            this.vx *= -RESTITUTION;
            playCollisionSound(Math.abs(this.vx) * 3);
        } else if (this.x > rightBound) {
            this.x = rightBound;
            this.vx *= -RESTITUTION;
            playCollisionSound(Math.abs(this.vx) * 3);
        }

        if (this.y < topBound) {
            this.y = topBound;
            this.vy *= -RESTITUTION;
            playCollisionSound(Math.abs(this.vy) * 3);
        } else if (this.y > bottomBound) {
            this.y = bottomBound;
            this.vy *= -RESTITUTION;
            playCollisionSound(Math.abs(this.vy) * 3);
        }
    }
}

// ─── Board Init ───────────────────────────────────────────────────────────────
function initBoard() {
    pieces = [];
    striker = null;

    pockets = [
        { x: BOARD_MARGIN, y: BOARD_MARGIN },
        { x: canvas.width - BOARD_MARGIN, y: BOARD_MARGIN },
        { x: BOARD_MARGIN, y: canvas.height - BOARD_MARGIN },
        { x: canvas.width - BOARD_MARGIN, y: canvas.height - BOARD_MARGIN }
    ];

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    const r = 14;

    pieces.push(new Piece(cx, cy, r, '#e74c3c', TYPE.QUEEN));

    for (let i = 0; i < 6; i++) {
        const angle = i * Math.PI / 3;
        const type = i % 2 === 0 ? TYPE.WHITE : TYPE.BLACK;
        const color = type === TYPE.WHITE ? '#f9f9f9' : '#222';
        pieces.push(new Piece(cx + Math.cos(angle) * r * 2.2, cy + Math.sin(angle) * r * 2.2, r, color, type));
    }

    for (let i = 0; i < 12; i++) {
        const angle = (i * Math.PI / 6) + (Math.PI / 12);
        const type = i % 2 === 0 ? TYPE.BLACK : TYPE.WHITE;
        const color = type === TYPE.WHITE ? '#f9f9f9' : '#222';
        pieces.push(new Piece(cx + Math.cos(angle) * r * 4.4, cy + Math.sin(angle) * r * 4.4, r, color, type));
    }

    resetStriker();
}

function resetStriker() {
    // ✅ FIX: Remove any existing striker from pieces array before creating new one
    if (striker !== null) {
        const idx = pieces.indexOf(striker);
        if (idx > -1) pieces.splice(idx, 1);
    }
    // Also purge any leftover inactive strikers
    pieces = pieces.filter(p => !(p.type === TYPE.STRIKER && !p.active));

    const baselineY = currentPlayer === 1 ? canvas.height - 100 : 100;
    striker = new Piece(canvas.width / 2, baselineY, 18, '#3498db', TYPE.STRIKER, 1.5);
    pieces.push(striker);

    strikerPosSlider.value = 0;
    strikerPosSlider.disabled = false;
    powerBar.style.width = '0%';
    isAiming = false;
}

// ─── Slider ───────────────────────────────────────────────────────────────────
strikerPosSlider.addEventListener('input', (e) => {
    if (striker && striker.vx === 0 && striker.vy === 0 && !piecesMoving) {
        const center = canvas.width / 2;
        const range = INNER_BOARD_SIZE / 2 - 50;
        striker.x = center + (parseFloat(e.target.value) * range);
    }
});

// ─── Mouse: Realistic Slingshot Aiming ───────────────────────────────────────
canvas.addEventListener('mousedown', (e) => {
    if (piecesMoving || !striker || !striker.active) return;
    resumeAudio();

    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    const dist = Math.hypot(mx - striker.x, my - striker.y);
    if (dist < striker.radius + 15) {
        isAiming = true;
        aimStart = { x: striker.x, y: striker.y };
        aimCurrent = { x: mx, y: my };
        strikerPosSlider.disabled = true;
        canvas.style.cursor = 'grabbing';
    }
});

canvas.addEventListener('mousemove', (e) => {
    if (!isAiming) return;
    const rect = canvas.getBoundingClientRect();
    aimCurrent = { x: e.clientX - rect.left, y: e.clientY - rect.top };

    const dx = aimStart.x - aimCurrent.x;
    const dy = aimStart.y - aimCurrent.y;
    const rawPower = Math.hypot(dx, dy) * 0.15;
    const power = Math.min(rawPower, MAX_POWER);

    // Update power bar
    powerBar.style.width = `${(power / MAX_POWER) * 100}%`;

    // Drag sound
    if (power > 1) playDragSound(power);
});

canvas.addEventListener('mouseup', () => {
    if (!isAiming) return;
    isAiming = false;
    canvas.style.cursor = 'crosshair';

    const dx = aimStart.x - aimCurrent.x;
    const dy = aimStart.y - aimCurrent.y;

    const rawPower = Math.hypot(dx, dy) * 0.15;
    const power = Math.min(rawPower, MAX_POWER);
    const angle = Math.atan2(dy, dx);

    powerBar.style.width = '0%';

    if (power > 1) {
        playReleaseSound(power);
        striker.vx = Math.cos(angle) * power;
        striker.vy = Math.sin(angle) * power;
        piecesMoving = true;
        logAction(`Player ${currentPlayer} shoots — power ${Math.round((power / MAX_POWER) * 100)}%`);
    } else {
        strikerPosSlider.disabled = false;
    }
});

// ─── Physics ─────────────────────────────────────────────────────────────────
function resolveCollision(p1, p2) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const distance = Math.hypot(dx, dy);

    if (distance < p1.radius + p2.radius && distance > 0) {
        const overlap = (p1.radius + p2.radius) - distance;
        const nx = dx / distance;
        const ny = dy / distance;

        p1.x -= nx * overlap / 2;
        p1.y -= ny * overlap / 2;
        p2.x += nx * overlap / 2;
        p2.y += ny * overlap / 2;

        const kx = p1.vx - p2.vx;
        const ky = p1.vy - p2.vy;
        const p = 2 * (nx * kx + ny * ky) / (p1.mass + p2.mass);

        p1.vx -= p * p2.mass * nx * RESTITUTION;
        p1.vy -= p * p2.mass * ny * RESTITUTION;
        p2.vx += p * p1.mass * nx * RESTITUTION;
        p2.vy += p * p1.mass * ny * RESTITUTION;

        const intensity = Math.abs(p);
        if (p1.type === TYPE.STRIKER || p2.type === TYPE.STRIKER) {
            playStrikerHitSound(intensity);
        } else {
            playCollisionSound(intensity);
        }
    }
}

function checkPockets(piece) {
    if (!piece.active) return false;

    for (let pocket of pockets) {
        const dist = Math.hypot(piece.x - pocket.x, piece.y - pocket.y);
        if (dist < POCKET_RADIUS) {
            piece.active = false;
            handlePocketing(piece);
            playPocketSound();
            return true;
        }
    }
    return false;
}

function handlePocketing(piece) {
    if (piece.type === TYPE.STRIKER) {
        logAction(`Foul! Striker pocketed. (-5 pts penalty)`);
        score[currentPlayer] = Math.max(0, score[currentPlayer] - 5);
        turnScore -= 5;
        playFoulSound();
    } else if (piece.type === TYPE.WHITE) {
        score[1] += 10;
        if (currentPlayer === 1) turnScore += 10;
        logAction(`White piece pocketed! (+10 pts)`);
    } else if (piece.type === TYPE.BLACK) {
        score[2] += 5;
        if (currentPlayer === 2) turnScore += 5;
        logAction(`Black piece pocketed! (+5 pts)`);
    } else if (piece.type === TYPE.QUEEN) {
        queenPocketed = true;
        score[currentPlayer] += 25;
        turnScore += 25;
        logAction(`👑 Queen pocketed! (+25 pts)`);
    }
    updateScoreUI();
}

function updateScoreUI() {
    score1El.innerText = score[1];
    score2El.innerText = score[2];
}

function endTurn() {
    // ✅ FIX: Properly remove striker via resetStriker (which handles cleanup)
    if (turnScore <= 0) {
        currentPlayer = currentPlayer === 1 ? 2 : 1;
        turnIndicator.innerText = `Player ${currentPlayer}'s Turn`;
        turnIndicator.className = `turn-indicator ${currentPlayer === 2 ? 'turn-p2' : ''}`;
    } else {
        logAction(`Player ${currentPlayer} retains the turn!`);
    }

    turnScore = 0;
    resetStriker();
}

// ─── Draw Board ───────────────────────────────────────────────────────────────
function drawBoard() {
    // Outer wood with grain effect
    const woodGrad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
    woodGrad.addColorStop(0, '#a0522d');
    woodGrad.addColorStop(0.5, '#8B4513');
    woodGrad.addColorStop(1, '#6b3410');
    ctx.fillStyle = woodGrad;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Inner board
    const boardGrad = ctx.createLinearGradient(BOARD_MARGIN, BOARD_MARGIN, canvas.width - BOARD_MARGIN, canvas.height - BOARD_MARGIN);
    boardGrad.addColorStop(0, '#faebd7');
    boardGrad.addColorStop(0.5, '#F5DEB3');
    boardGrad.addColorStop(1, '#deb887');
    ctx.fillStyle = boardGrad;
    ctx.fillRect(BOARD_MARGIN, BOARD_MARGIN, INNER_BOARD_SIZE, INNER_BOARD_SIZE);

    // Board inner shadow
    ctx.shadowColor = 'rgba(0,0,0,0.4)';
    ctx.shadowBlur = 15;
    ctx.shadowOffsetX = 5;
    ctx.shadowOffsetY = 5;
    ctx.fillRect(BOARD_MARGIN, BOARD_MARGIN, INNER_BOARD_SIZE, INNER_BOARD_SIZE);
    ctx.shadowBlur = 0;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 0;

    const cx = canvas.width / 2;
    const cy = canvas.height / 2;

    // Center circle
    ctx.beginPath();
    ctx.arc(cx, cy, 60, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,0,0,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Center dot
    ctx.beginPath();
    ctx.arc(cx, cy, 10, 0, Math.PI * 2);
    ctx.fillStyle = '#e74c3c';
    ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
    ctx.stroke();

    // Baselines (shooting lines)
    ctx.beginPath();
    ctx.setLineDash([5, 5]);
    ctx.moveTo(100, canvas.height - 100);
    ctx.lineTo(canvas.width - 100, canvas.height - 100);
    ctx.moveTo(100, 100);
    ctx.lineTo(canvas.width - 100, 100);
    ctx.moveTo(100, 100);
    ctx.lineTo(100, canvas.height - 100);
    ctx.moveTo(canvas.width - 100, 100);
    ctx.lineTo(canvas.width - 100, canvas.height - 100);
    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.setLineDash([]);

    // Striker zone highlight on baseline
    if (striker && !piecesMoving) {
        const baselineY = currentPlayer === 1 ? canvas.height - 100 : 100;
        ctx.beginPath();
        ctx.moveTo(100, baselineY);
        ctx.lineTo(canvas.width - 100, baselineY);
        ctx.strokeStyle = currentPlayer === 1 ? 'rgba(46,204,113,0.5)' : 'rgba(230,126,34,0.5)';
        ctx.lineWidth = 3;
        ctx.setLineDash([]);
        ctx.stroke();
    }

    // Pockets
    for (let p of pockets) {
        // Outer glow
        const pGrad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, POCKET_RADIUS);
        pGrad.addColorStop(0, '#000');
        pGrad.addColorStop(0.7, '#1a1a1a');
        pGrad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.beginPath();
        ctx.arc(p.x, p.y, POCKET_RADIUS + 4, 0, Math.PI * 2);
        ctx.fillStyle = pGrad;
        ctx.fill();

        ctx.beginPath();
        ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
        ctx.fillStyle = '#111';
        ctx.fill();
    }
}

// ─── Aim Visualization (Slingshot style) ─────────────────────────────────────
function drawAimVisual() {
    if (!isAiming || !striker) return;

    const dx = aimStart.x - aimCurrent.x;
    const dy = aimStart.y - aimCurrent.y;
    const dist = Math.hypot(dx, dy);
    const rawPower = dist * 0.15;
    const power = Math.min(rawPower, MAX_POWER);
    const angle = Math.atan2(dy, dx);

    // Power ratio 0-1
    const t = power / MAX_POWER;

    // ── Elastic band: striker center → pull point ──
    ctx.beginPath();
    ctx.moveTo(aimStart.x, aimStart.y);
    ctx.lineTo(aimCurrent.x, aimCurrent.y);
    const bandAlpha = 0.4 + t * 0.5;
    ctx.strokeStyle = `rgba(52,152,219,${bandAlpha})`;
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // Pull point indicator
    ctx.beginPath();
    ctx.arc(aimCurrent.x, aimCurrent.y, 7, 0, Math.PI * 2);
    const handleColor = t < 0.4 ? '#2ecc71' : t < 0.75 ? '#f1c40f' : '#e74c3c';
    ctx.fillStyle = handleColor;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // ── Trajectory preview (dotted arc in shoot direction) ──
    if (power > 1.5) {
        const steps = 10;
        const stepDist = power * 3;
        ctx.beginPath();
        for (let i = 1; i <= steps; i++) {
            const px = aimStart.x + Math.cos(angle) * stepDist * i;
            const py = aimStart.y + Math.sin(angle) * stepDist * i;
            const opacity = (1 - i / steps) * 0.7;
            const dotR = 3 * (1 - i / steps) + 1;
            ctx.beginPath();
            ctx.arc(px, py, dotR, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(255,255,255,${opacity})`;
            ctx.fill();
        }

        // Power label
        ctx.font = 'bold 13px Segoe UI';
        ctx.fillStyle = handleColor;
        ctx.textAlign = 'center';
        ctx.fillText(`${Math.round(t * 100)}%`, aimCurrent.x, aimCurrent.y - 16);
    }

    // Glow around striker when stretched
    ctx.save();
    ctx.beginPath();
    ctx.arc(aimStart.x, aimStart.y, striker.radius + 6 + t * 8, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(52,152,219,${0.2 + t * 0.5})`;
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.restore();
}

// ─── Log ─────────────────────────────────────────────────────────────────────
function logAction(msg) {
    agentLogs.innerHTML += `> ${msg}<br>`;
    agentLogs.scrollTop = agentLogs.scrollHeight;
}

// ─── Game Loop ────────────────────────────────────────────────────────────────
function gameLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawBoard();

    let anyMoving = false;

    for (let i = 0; i < pieces.length; i++) {
        let p1 = pieces[i];
        if (!p1.active) continue;

        p1.update();

        if (Math.abs(p1.vx) > 0 || Math.abs(p1.vy) > 0) {
            anyMoving = true;
        }

        if (checkPockets(p1)) continue;

        for (let j = i + 1; j < pieces.length; j++) {
            let p2 = pieces[j];
            if (p1.active && p2.active) {
                resolveCollision(p1, p2);
            }
        }

        p1.draw(ctx);
    }

    // Draw aim visual on top
    drawAimVisual();

    if (piecesMoving && !anyMoving) {
        piecesMoving = false;
        endTurn();
    }

    requestAnimationFrame(gameLoop);
}

// ─── Reset ────────────────────────────────────────────────────────────────────
resetBtn.addEventListener('click', () => {
    score = { 1: 0, 2: 0 };
    currentPlayer = 1;
    turnScore = 0;
    queenPocketed = false;
    updateScoreUI();
    turnIndicator.innerText = `Player 1's Turn`;
    turnIndicator.className = `turn-indicator`;
    agentLogs.innerHTML = `> Game Reset<br>`;
    initBoard();
});

// ─── Start ────────────────────────────────────────────────────────────────────
initBoard();
requestAnimationFrame(gameLoop);

</script>
